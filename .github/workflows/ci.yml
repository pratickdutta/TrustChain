name: TrustChain CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Type Check (tsc)
        run: npx --yes tsc --noEmit

      - name: Lint (ESLint via Next.js)
        run: npx --yes next lint --max-warnings 0
        # Uses Next.js built-in ESLint runner which correctly resolves the config
        continue-on-error: false

      - name: Build Next.js App
        env:
          # Provide dummy env vars so the build doesn't fail on missing secrets
          MONGODB_URI: mongodb://localhost:27017/trustchain_ci
          JWT_SECRET: ci_placeholder_secret_32chars_long
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  # ── Smart Contracts (Soroban/Rust) ────────────────────────────────────────────
  contracts:
    name: Build & Test Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Check Formatting (cargo fmt)
        run: cargo fmt -- --check

      - name: Lint (cargo clippy)
        run: cargo clippy --all-targets -- -D warnings -A clippy::too_many_arguments

      - name: Build Contracts (WASM)
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run Tests (cargo test)
        run: cargo test
